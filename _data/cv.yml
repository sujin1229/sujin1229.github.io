  email: kane0113@skku.edu
  location: Suwon, Republic of Korea
  image: ""
  summary: >
    AI-driven civil infrastructure researcher focused on computer vision, large
    language models, multimodal sensing, and 3D reconstruction for smart
    construction, structural health monitoring, and infrastructure maintenance.
    My work develops explainable, data-driven frameworks that integrate visual,
    NDT, BIM, LiDAR, and ontology-based information for automated defect
    diagnosis, safety monitoring, and digital-twin applications — a field-first
    approach that returns technology to practitioners on site. First-author in
    Automation in Construction.


    Projects:
      - name: "AI-Agent-Based Automated HOS Analysis System (URP Project) (2024)"
        summary: "LLM multi-agent system for Holistic Operational Signature analysis; Brick Schema ontology-driven feature extraction and LLM-tuned k-means clustering; reached 99.53% cluster-classification accuracy (2 errors / 2,541 cases)."
      - name: "NeRF to BIM: Integration of LiDAR & Neural Radiance Fields (2024)"
        summary: "Evaluated NeRF against LiDAR and BIM for precise 3D reconstruction of construction data; studied automated BIM transformation and digital-twin 3D visualization."
      - name: "AI-Based Worker Safety Monitoring System for Construction Sites (2024)"
        summary: "Real-time worker-safety monitoring fusing biometric and environmental data, integrated with Structural Health Monitoring for a site safety-evaluation model."
      - name: "Eco-Friendly Water-Quality Improvement System Using Wind-Powered Ventilation (2024)"
        summary: "Purification system driven by wind-powered natural ventilation; validated water-quality gains across air-injection methods."
      - name: "Modular Urban Tensegrity Pedestrian Overpass Design (2023)"
        summary: "BIM-based design and Twinmotion 3D visualization of a modular tensegrity pedestrian overpass to cut construction time and improve maintenance efficiency."
      - name: "Olympic Expressway Undergrounding Project (2023)"
        summary: "Feasibility studies and master planning for undergrounding the Olympic Expressway via economic analysis, simulation, and BIM modeling."
      - name: "Bambat Overpass Undergrounding & Environmental Improvement Project (2023)"
        summary: "BIM-based redevelopment plan to underground an existing overpass, analyzing urban environmental impact and economic feasibility."

